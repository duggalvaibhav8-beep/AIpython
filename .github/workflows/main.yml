name: Deploy Python App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/AIpython
            git pull origin main
            
            ./venv/bin/pip install -r requirements.txt
            pm2 delete backend || true

            pm2 start "./venv/bin/python -m streamlit run app.py --server.port 8501 --server.address 0.0.0.0" --name backend
            pm2 save

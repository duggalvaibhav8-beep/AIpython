name: Python CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Python
        run: |
          python3 --version
          pip3 --version

      - name: Create virtual environment
        run: python3 -m venv venv

      - name: Install dependencies
        run: |
          . venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python project with PM2
        run: |
          . venv/bin/activate
          pm2 delete aipython-github || true
          pm2 start "uvicorn unified_main:app --host 0.0.0.0 --port 8001" --name aipython-github
          pm2 save
